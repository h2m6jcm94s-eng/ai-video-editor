          type: number
          minimum: 0
        timeSignature:
          type: string
          default: "4/4"
        key:
          type: string
        energyCurve:
          type: array
          items:
            type: number
        sectionMarkers:
          type: array
          items:
            $ref: "#/components/schemas/SectionMarker"
        colorGradeRef:
          type: string
        aspectRatio:
          type: string
          default: "9:16"

    SectionMarker:
      type: object
      required: [name, startS, endS]
      properties:
