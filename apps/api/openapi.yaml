          type: number
          minimum: 0
        endS:
          type: number
          minimum: 0

    Slot:
      type: object
      required: [index, startS, durationS, beatIndex, section, targetShotType, subjectHint, motionHint]
      properties:
        index:
          type: integer
          minimum: 0
        startS:
          type: number
          minimum: 0
        durationS:
          type: number
          minimum: 0
        beatIndex:
          type: integer
          minimum: 0
        section:
          type: string
          minLength: 1
        transitionIn:
          type: string
          default: hard_cut
        transitionOut:
          type: string
          default: hard_cut
        targetShotType:
          type: string
          minLength: 1
        subjectHint:
          type: string
          minLength: 1
        motionHint:
          type: string
          minLength: 1
        energyLevel:
          type: number
          minimum: 0
          maximum: 1
          default: 0.5
        requiredTags:
          type: array
          items:
            type: string
        avoidTags:
          type: array
          items:
            type: string
        selectedClipId:
          type: string
        rankedClipIds:
          type: array
          items:
            type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        maskAssetId:
          type: string
          format: uuid
          nullable: true
        maskEnabled:
          type: boolean
          default: true
        identityIdsPresent:
          type: array
          items:
            type: integer
          default: []
        protagonistMatteEnabled:
          type: boolean
          default: true
        enableKineticText:
          type: boolean
          default: false
        textZLayer:
          type: string
          enum: [on_top, behind_subject]
          default: on_top
        textDensity:
          type: string
          enum: [low, medium, high]
          default: medium
        kineticText:
          type: string
        effects:
          type: array
          items:
            $ref: "#/components/schemas/Effect"
        sourceWindowStartS:
          type: number
          minimum: 0
        anticipationOffsetS:
          type: number
          default: 0
        heatmapScore:
          type: number
          minimum: 0
          maximum: 1

    Overlay:
      type: object
      required: [text, startS, endS]
      properties:
        text:
          type: string
          minLength: 1
        startS:
          type: number
          minimum: 0
        endS:
          type: number
          minimum: 0
        position:
          type: string
          default: center
        font:
          type: string
          default: Inter
        fontSizePx:
          type: integer
          minimum: 1
          default: 48
        color:
          type: string
          default: "#FFFFFF"
        stroke:
          type: string
        animation:
          type: string
          default: none

    AudioTrack:
      type: object
      required: [assetId, gainDb, startS, endS]
      properties:
        assetId:
          type: string
          minLength: 1
        gainDb:
          type: number
          minimum: -60
          maximum: 12
          default: 0
        startS:
          type: number
          minimum: 0
        endS:
          type: number
          minimum: 0
        fadeInS:
          type: number
          minimum: 0
          default: 0
        fadeOutS:
          type: number
          minimum: 0
          default: 0

    Effect:
      type: object
      required: [name]
      properties:
        name:
          type: string
        params:
          type: object
