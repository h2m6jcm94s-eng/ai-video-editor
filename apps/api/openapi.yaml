      type: object
      required: [globals, slots]
      properties:
        globals:
          $ref: "#/components/schemas/CutListGlobals"
        slots:
          type: array
          items:
            $ref: "#/components/schemas/Slot"
          minItems: 1
        overlays:
          type: array
          items:
            $ref: "#/components/schemas/Overlay"
        audioTracks:
          type: array
          items:
            $ref: "#/components/schemas/AudioTrack"

