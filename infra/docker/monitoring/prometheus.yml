global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ave-api"
    static_configs:
      - targets: ["host.docker.internal:4000"]
    metrics_path: "/api/metrics"
    # If METRICS_AUTH_TOKEN is set, add bearer_token:
    # bearer_token: "your-metrics-token"

alerting:
  alertmanagers: []

rule_files: []
