version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=ave
      - POSTGRES_PASSWORD=ave
      - POSTGRES_DB=ave
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ave"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  temporal:
    image: temporalio/auto-setup:1.29
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=ave
      - POSTGRES_PWD=ave
      - POSTGRES_SEEDS=postgres
    ports: ["7233:7233", "8233:8233"]
    depends_on: [postgres]

  temporal-ui:
    image: temporalio/ui:2.32.0
    environment: [TEMPORAL_ADDRESS=temporal:7233]
    ports: ["8080:8080"]
    depends_on: [temporal]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      (mc mb local/ai-video-editor || true) &&
      mc anonymous set download local/ai-video-editor &&
      echo 'Bucket ai-video-editor ready'
      "

volumes:
  postgres_data:
  minio_data:
