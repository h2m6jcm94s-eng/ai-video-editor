# Self-hosted LGTM stack: Loki + Grafana + Tempo + Prometheus + Promtail + OTel Collector
# Usage: docker compose -f infra/observability/docker-compose.yml up -d
#
# Ports (all bound to 127.0.0.1 for security):
#   Grafana      3001
#   Prometheus   9090
#   Loki         3100
#   Tempo        3200
#   OTel gRPC    4317
#   OTel HTTP    4318

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ave-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    networks:
      - ave-observability

  loki:
    image: grafana/loki:3.3.0
    container_name: ave-loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - ave-observability

  tempo:
    image: grafana/tempo:2.7.0
    container_name: ave-tempo
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4317:4317"
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    command: -config.file=/etc/tempo.yaml
    networks:
      - ave-observability

  promtail:
    image: grafana/promtail:3.3.0
    container_name: ave-promtail
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - ave-observability
    depends_on:
      - loki

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    container_name: ave-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    networks:
      - ave-observability
    depends_on:
      - tempo
      - loki
      - prometheus

  grafana:
    image: grafana/grafana:11.4.0
    container_name: ave-grafana
    ports:
      - "127.0.0.1:${OBS_GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:${OBS_GRAFANA_PORT:-3001}"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - ave-observability
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  prom-data:
  loki-data:
  tempo-data:
  grafana-data:

networks:
  ave-observability:
    driver: bridge
