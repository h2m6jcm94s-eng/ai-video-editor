name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  UV_VERSION: "0.4.x"

jobs:
  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ai-video-editor/api typecheck
      - name: Run tests with coverage
        run: pnpm --filter @ai-video-editor/api test:coverage
        env:
          NODE_ENV: test
      - name: Upload API coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/api/coverage/coverage-final.json
          flags: api
          name: api-coverage
          fail_ci_if_error: false

  test-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          version: ${{ env.UV_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync
      - run: uv run ruff check services/
      - run: uv run mypy services/
      - run: uv run pytest tests/ -v
      - name: Run Python tests with coverage
        run: uv run pytest tests/ -v --tb=short --cov=services/shared-py/src --cov-report=xml:coverage-python.xml
      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-python.xml
          flags: python
          name: python-coverage
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: [test-js, test-api, test-py]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker-compose -f infra/docker/docker-compose.yml build
