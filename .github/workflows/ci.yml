name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  UV_VERSION: "0.4.x"

jobs:
  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ai-video-editor/shared-types build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy00000000000000000000000000000000000000000000000000

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ai-video-editor/shared-types build
      - run: pnpm --filter @ai-video-editor/api typecheck
      - name: Run tests with coverage
        run: pnpm --filter @ai-video-editor/api test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://localhost:5432/test
          CLERK_SECRET_KEY: sk_test_dummy_key_for_ci_only
          WEB_URL: http://localhost:3000
          R2_ENDPOINT: http://localhost:9000
          R2_ACCESS_KEY_ID: minioadmin
          R2_SECRET_ACCESS_KEY: minioadmin
          R2_BUCKET_NAME: test
          REDIS_URL: redis://localhost:6379
          TEMPORAL_HOST: localhost:7233
      - name: Upload API coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/api/coverage/coverage-final.json
          flags: api
          name: api-coverage
          fail_ci_if_error: false

  test-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --no-install-project --dev
      - run: uv run --no-project ruff check services/ || true
        continue-on-error: true
      - run: uv run --no-project mypy services/ --ignore-missing-imports || true
        continue-on-error: true
      - name: Run Python tests with coverage
        run: uv run --no-project pytest tests/ -v --tb=short --cov=services/shared-py/src --cov-report=xml:coverage-python.xml -m "not requires_anthropic and not requires_google and not requires_groq and not requires_openai and not requires_kimi and not requires_qwen and not requires_openrouter"
      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-python.xml
          flags: python
          name: python-coverage
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: [test-js, test-api, test-py]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker compose -f infra/docker/docker-compose.yml build

  # Single gate that branch protection can require. Adding new test jobs is a one-line change.
  ci-gate:
    runs-on: ubuntu-latest
    needs: [test-js, test-api, test-py, docker]
    if: always()
    steps:
      - name: Require all required jobs to pass
        run: |
          results=("${{ needs.test-js.result }}" "${{ needs.test-api.result }}" "${{ needs.test-py.result }}" "${{ needs.docker.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" != "success" ]]; then
              echo "::error::Required job failed with result: $result"
              exit 1
            fi
          done
          echo "All required jobs passed."
