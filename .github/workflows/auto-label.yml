name: Auto Label

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  pr-labels:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

      - name: Label first-time contributor
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 2,
              creator: author
            });
            if (prs.length <= 1) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['first-time contributor']
              });
            }

  issue-labels:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Label by keywords
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;
            const labels = [];

            if (/\bbug\b|crash|error|fail|broken/.test(text)) labels.push('bug');
            if (/\bfeat\b|feature|add|support|implement/.test(text)) labels.push('enhancement');
            if (/\bsecurity\b|vuln|cve|xss|injection|auth/.test(text)) labels.push('security');
            if (/\btest\b|coverage| flaky | mock /.test(text)) labels.push('testing');
            if (/\bperf\b|slow|memory|cpu|cache|optimize/.test(text)) labels.push('performance');
            if (/\bdoc\b|readme|guide|tutorial/.test(text)) labels.push('documentation');
            if (/\brefactor\b|cleanup|lint|format|debt/.test(text)) labels.push('code-quality');
            if (/\bdeps?\b|upgrade|bump|version/.test(text)) labels.push('dependencies');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels
              });
            }
